<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../img/logo.png" type="image/x-icon">
    <title>Sainy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css" integrity="sha512-9xKTRVabjVeZmc+GUW8GgSmcREDunMM+Dt/GrzchfN8tkwHizc5RP4Ok/MXFFy5rIjJjzhndFScTceq5e6GvVQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div id="container">
        <header class="header">
            <nav>
                <a href="#" aria-label="User Profile"> <i class="fa-solid fa-user"></i> </a>
            </nav>
        </header>

        <nav class="sidebar">
            <div id="img-logo">
                <a href="#" aria-label="Home"> 
                    <img src="../img/logo.png" alt="logo" height="100" width="100" class="logo">
                </a> 
            </div>
            <div class="tools">
                <ul>
                    <li>
                        <a href="#"> <i class="fa-solid fa-bullseye"></i> Vision Board </a>
                    </li>
                    <li>
                        <a href="#"> <i class="fa-solid fa-list"></i> Todo list </a>
                    </li>
                    <li>
                        <a href="#"> <i class="fa-solid fa-calendar-days"></i> Planning </a>
                    </li>
                    <li>
                        <a href="#"> <i class="fa-solid fa-newspaper"></i> Journaling </a>
                    </li>
                    <li>
                        <a href="#"> <i class="fa-solid fa-clock"></i> Pomodoro </a>
                    </li>
                    <li>
                        <a href="#"> <i class="fa-solid fa-chart-line"></i> Dashboard </a>
                    </li>
                    <li>
                        <a href="#"> <i class="fa-solid fa-gear"></i> Settings </a>
                    </li>
                </ul>
            </div>
        </nav>

        <section id="todo-section" class="section">
            
            <form id="todo-form">
                <input type="text" id="todo-input" placeholder="Ajouter une tâche..." required>
                <button type="submit">Add</button>
            </form>


          <div class="kanban">
                <div class="kanban-columns">
                    <div class="kanban-column" id="todo-column">
                        <h3>To Do</h3>
                        <ul class="kanban-list" id="todo-kanban">
                            
                        </ul>
                    </div>
                    <div class="kanban-column" id="in-progress-column">
                        <h3>In Progress</h3>
                        <ul class="kanban-list" id="in-progress-kanban"></ul>
                    </div>
                    <div class="kanban-column" id="done-column">
                        <h3>Done</h3>
                        <ul class="kanban-list" id="done-kanban"></ul>
                    </div>
                </div>
        </div>  
        </section>
    </div>
</body>
</html>
